  <body>
    <!-- Loading screen -->
    <div id="loading-screen">
      <div class="spinner"></div>
    </div>
    
    <!-- React root -->
    <div id="root"></div>
    
    <script>
      // WHITESCREEN FIX:
      // 1) Remove the loading screen as soon as the React entrypoint starts or #root mutates.
      // 2) If boot stalls, unregister stale app-shell service workers/caches with bounded timeouts.
      // 3) Never destroy body again on the same session — offer a non-destructive recovery UI.
      (function () {
        var removed = false;
        function removeLoader() {
          if (removed) return;
          removed = true;
          var el = document.getElementById('loading-screen');
          if (!el) return;
          el.style.opacity = '0';
          el.style.transition = 'opacity 0.3s';
          setTimeout(function () { el.remove(); }, 300);
        }
        window.addEventListener('aqua:react-started', removeLoader, { once: true });
        var root = document.getElementById('root');
        var obs = new MutationObserver(function () {
          if (root.childNodes.length > 0) { removeLoader(); obs.disconnect(); }
        });
        obs.observe(root, { childList: true });
        if (root.childNodes.length > 0) removeLoader();

        function withBootTimeout(promise, ms) {
          return Promise.race([
            promise,
            new Promise(function (resolve) { setTimeout(resolve, ms); })
          ]);
        }

        async function hardRecover() {
          try {
            if ('serviceWorker' in navigator) {
              var regs = await withBootTimeout(navigator.serviceWorker.getRegistrations(), 1200) || [];
              for (var r of regs) { try { await withBootTimeout(r.unregister(), 800); } catch (e) {} }
            }
            if (window.caches && caches.keys) {
              var keys = await withBootTimeout(caches.keys(), 1200) || [];
              for (var k of keys) { try { await caches.delete(k); } catch (e) {} }
            }
            try { localStorage.removeItem('aqua-recovered'); } catch (e) {}
            try { sessionStorage.removeItem('aqua-recovered'); } catch (e) {}
            try { sessionStorage.removeItem('aqua-chunk-recovered'); } catch (e) {}
          } catch (e) {}
        }

        // Expose for the /status page "Clear App Cache" button.
        window.__aquaHardRecover = async function () { await hardRecover(); location.reload(); };

        if (location.search.indexOf('sw=off') !== -1) {
          hardRecover();
        }

        function renderEmergencyStatus(message) {
          removeLoader();
          if (document.getElementById('aqua-recovery-overlay')) return;
          var overlay = document.createElement('div');
          overlay.id = 'aqua-recovery-overlay';
          overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;align-items:flex-start;justify-content:center;padding:48px 18px;text-align:left;background:#0A0F1F;color:#F3F4F6;overflow:auto';
          overlay.innerHTML =
            '<main style="width:min(680px,100%);display:grid;gap:16px">' +
            '<section style="border:1px solid rgba(148,163,184,.24);background:rgba(15,23,42,.82);border-radius:16px;padding:18px;box-shadow:0 18px 60px rgba(0,0,0,.28)">' +
            '<p style="margin:0 0 8px;font-size:12px;color:#93C5FD;font-weight:700;letter-spacing:.08em;text-transform:uppercase">AqualibriaAI Recovery</p>' +
            '<h1 style="margin:0 0 10px;font-size:24px;line-height:1.15;color:#F8FAFC">Aplikasi gagal boot sebelum React berjalan</h1>' +
            '<p style="margin:0;color:#CBD5E1;font-size:14px;line-height:1.6">' + message + '</p>' +
            '</section>' +
            '<section style="border:1px solid rgba(148,163,184,.18);background:rgba(2,6,23,.72);border-radius:16px;padding:16px;display:grid;gap:12px">' +
            '<div style="display:flex;justify-content:space-between;gap:16px;border-bottom:1px solid rgba(148,163,184,.14);padding-bottom:10px"><span style="color:#94A3B8">Backend</span><strong id="aqua-static-backend">Memeriksa…</strong></div>' +
            '<div style="display:flex;justify-content:space-between;gap:16px;border-bottom:1px solid rgba(148,163,184,.14);padding-bottom:10px"><span style="color:#94A3B8">Penyebab paling mungkin</span><strong style="text-align:right">Konfigurasi build hilang</strong></div>' +
            '<div style="display:flex;justify-content:space-between;gap:16px"><span style="color:#94A3B8">Service worker/cache</span><strong id="aqua-static-sw">Memeriksa…</strong></div>' +
            '</section>' +
            '<section style="display:flex;gap:10px;flex-wrap:wrap">' +
            '<button id="aqua-clear-btn" style="padding:11px 16px;border-radius:10px;border:0;background:#1E3A8A;color:#fff;font-size:14px;font-weight:700">Bersihkan Cache & Reload</button>' +
            '<button id="aqua-retry-btn" style="padding:11px 16px;border-radius:10px;border:1px solid rgba(148,163,184,.28);background:transparent;color:#F8FAFC;font-size:14px;font-weight:700">Coba Boot Lagi</button>' +
            '</section>' +
            '<p style="margin:0;color:#64748B;font-size:12px;line-height:1.5">Halaman ini sengaja dibuat tanpa React, jadi tetap muncul walau bundle utama crash.</p>' +
            '</main>';
          document.body.appendChild(overlay);
          var retry = document.getElementById('aqua-retry-btn');
          if (retry) retry.onclick = function () { location.reload(); };
          var clear = document.getElementById('aqua-clear-btn');
          if (clear) clear.onclick = async function () { await hardRecover(); location.reload(); };
          (async function () {
            try {
              var regs = 'serviceWorker' in navigator ? await navigator.serviceWorker.getRegistrations() : [];
              var keys = window.caches && caches.keys ? await caches.keys() : [];
              var swEl = document.getElementById('aqua-static-sw');
              if (swEl) swEl.textContent = (regs.length ? regs.length + ' aktif' : 'nonaktif') + ' · cache ' + keys.length;
            } catch (e) {}
            try {
              var r = await fetch('https://awkolliegwmdgpklqqwr.supabase.co/auth/v1/health', { method: 'GET', cache: 'no-store' });
              var b = document.getElementById('aqua-static-backend');
              if (b) { b.textContent = r.ok ? 'Aktif' : 'Terjangkau, HTTP ' + r.status; b.style.color = r.ok ? '#34D399' : '#FBBF24'; }
            } catch (e) {
              var be = document.getElementById('aqua-static-backend');
              if (be) { be.textContent = 'Tidak terjangkau'; be.style.color = '#F87171'; }
            }
          })();
        }

        window.addEventListener('error', function (event) {
          var msg = String(event.message || 'Terjadi error saat memuat bundle.');
          if (/supabaseUrl is required|supabaseKey is required|Failed to fetch dynamically imported module|Importing a module script failed|ChunkLoadError|Loading chunk/i.test(msg)) {
            renderEmergencyStatus('Crash terdeteksi: ' + msg + '. Build produksi sebelumnya dibuat tanpa konfigurasi backend publik, sehingga bundle berhenti sebelum route /status sempat dirender.');
          }
        });
        window.addEventListener('unhandledrejection', function (event) {
          var reason = event.reason && (event.reason.message || event.reason);
          var msg = String(reason || 'Promise gagal saat boot.');
          if (/supabaseUrl is required|supabaseKey is required|Failed to fetch dynamically imported module|Importing a module script failed|ChunkLoadError|Loading chunk/i.test(msg)) {
            renderEmergencyStatus('Crash terdeteksi: ' + msg + '. Build produksi sebelumnya dibuat tanpa konfigurasi backend publik, sehingga bundle berhenti sebelum route /status sempat dirender.');
          }
        });

        setTimeout(async function () {
          if (removed) return;
          if (root.childNodes.length > 0) return; // app mounted fine
          renderEmergencyStatus('Bundle utama belum mount setelah 4 detik. Ini bukan masalah halaman /status; ini berarti aplikasi crash sebelum router hidup.');
        }, 4000);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
